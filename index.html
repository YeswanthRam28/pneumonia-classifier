<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia AI - Client Side</title>
    <!-- Load ONNX Runtime Web from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #4CAF50; }
        p { color: #aaaaaa; font-size: 0.9rem; margin-bottom: 20px; }
        input[type="file"] { display: none; }
        .upload-btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px 0;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .upload-btn:hover { background-color: #45a049; }
        #imagePreview { max-width: 100%; border-radius: 8px; display: none; margin-top: 20px; }
        #result { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #4CAF50;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 20px auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Pneumonia Detector</h1>
    <p>100% Client-Side AI (No server needed)</p>
    
    <label class="upload-btn">
        Upload X-Ray
        <input type="file" id="imageInput" accept="image/png, image/jpeg">
    </label>
    
    <img id="imagePreview" src="#" alt="Image Preview" />
    <canvas id="canvas" width="224" height="224" style="display:none;"></canvas>
    
    <div class="loader" id="loader"></div>
    <div id="result"></div>
</div>

<script>
    const CLASSES = ['Normal', 'Pneumonia'];
    let session = null;

    // 1. Load the ONNX model
    async function loadModel() {
        document.getElementById('result').innerText = "Loading AI Model (this takes a moment)...";
        try {
            // Pointing to the ONNX file we exported
            session = await ort.InferenceSession.create('./best_model.onnx', { executionProviders: ['wasm'] });
            document.getElementById('result').innerText = "Model loaded successfully! Ready.";
        } catch (e) {
            document.getElementById('result').innerHTML = `<span style="color:red">Error loading model: ${e}</span>`;
        }
    }

    loadModel();

    document.getElementById('imageInput').addEventListener('change', async function() {
        if (!session) {
            alert("Please wait for the model to finish loading.");
            return;
        }
        const file = this.files[0];
        if (!file) return;

        // Preview Image
        const img = document.getElementById('imagePreview');
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
        
        document.getElementById('result').innerHTML = '';
        document.getElementById('loader').style.display = 'block';

        img.onload = async () => {
            // Process image and run inference
            try {
                const tensor = preprocessImage(img);
                const feeds = { 'input': tensor }; // Match the input name used in export
                
                // Run ONNX Session
                const results = await session.run(feeds);
                const outputTensor = results['output'];
                const data = outputTensor.data;
                
                // Apply Softmax manually or just take argmax
                // Since it's binary cross entropy / logits, index 0 is Normal, 1 is Pneumonia
                const maxIndex = data[0] > data[1] ? 0 : 1;
                const prediction = CLASSES[maxIndex];
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result').innerHTML = `Diagnosis: <span style="color:#4CAF50">${prediction}</span>`;
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result').innerHTML = `<span style="color:red">Inference failed. Check console.</span>`;
            }
        };
    });

    // 2. Image Preprocessing (Matches PyTorch Transforms)
    function preprocessImage(img) {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Resize to 224x224
        ctx.drawImage(img, 0, 0, 224, 224);
        const imageData = ctx.getImageData(0, 0, 224, 224).data;
        
        const float32Data = new Float32Array(3 * 224 * 224);
        
        // ImageNet normalization constants
        const mean = [0.485, 0.456, 0.406];
        const std = [0.229, 0.224, 0.225];
        
        // Convert [H, W, C] HTML image data to [C, H, W] PyTorch Float Tensor
        for (let i = 0; i < 224 * 224; i++) {
            const r = imageData[i * 4 + 0] / 255.0;
            const g = imageData[i * 4 + 1] / 255.0;
            const b = imageData[i * 4 + 2] / 255.0;

            float32Data[i] = (r - mean[0]) / std[0];                   // R channel
            float32Data[224 * 224 + i] = (g - mean[1]) / std[1];       // G channel
            float32Data[2 * 224 * 224 + i] = (b - mean[2]) / std[2];   // B channel
        }
        
        // Create ONNX tensor [Batch, Channels, Height, Width]
        return new ort.Tensor('float32', float32Data, [1, 3, 224, 224]);
    }
</script>

</body>
</html>
